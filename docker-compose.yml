services:
  ai:
    image: python:3.11-slim
    working_dir: /app
    env_file:
      - .env
    environment:
      APP_API_BASE_URL: http://app:3000
    volumes:
      - .:/app
    command: >
      sh -c "pip install --no-cache-dir -r backend/ai_service/requirements.txt
      && python -m uvicorn backend.ai_service.app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  app:
    image: node:22-slim
    working_dir: /app
    env_file:
      - .env
    environment:
      AI_SERVICE_URL: http://ai:8000
      PORT: 3000
    volumes:
      - .:/app
    command: >
      sh -c "npm install
      && npm run build
      && npm run start"
    ports:
      - "3000:3000"
    depends_on:
      - ai
